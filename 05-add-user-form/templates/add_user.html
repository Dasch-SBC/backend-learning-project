<!DOCTYPE html>
<html>
<head>
    <title>Add User</title>
</head>
<body>

    <h1>Add User</h1>

    <form method="POST">

        <p>Name</p>
        <input type="text" name="name">

        <p>Email</p>
        <input type="email" name="email">

        <p>Age</p>
        <input type="number" name="age">

        <p>Phone Number</p>
        <input type="text" name="phoneNumber">

        <br><br>

        <button type="submit">
            Save
        </button>

    </form>

</body>
</html>
