<!DOCTYPE hmtl>
<html>
<head>
     <title>Daftar User</title>
</head>
<body>

<h1>Daftar User</h1>

<a href="/add">Tambah User</a>
<br><br>

<table border="1">
   <tr>
       <th>ID</th>
       <th>Nama</th>
       <th>Email</th>
   </tr>
   
   {% for user in user %}
   <tr>
       <td>{{ user[0] }}</td>
       <td>{{ user[1] }}</td>
       <td>{{ user[2] }}</td>
   </tr>
   {% endfor %}

</table>

</body>
</html>
