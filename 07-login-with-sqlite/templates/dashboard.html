<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>Dashboard</h1>

<p>Welcome {{ username }}</p>

<table border="1">
   <tr>
       <th>ID</th>
       <th>Nama</th>
       <th>Email</th>
   </tr>
   
   {% for user in users %}
   <tr>
       <td>{{ user[0] }}</td>
       <td>{{ user[1] }}</td>
       <td>{{ user[3] }}</td>
   </tr>
   {% endfor %}

</table><br><br>

<p>There Are {{ total_users }} registered users</p>

<a href="/logout">
    Logout
</a>

</body>
</html>
